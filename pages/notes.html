<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Notes Library — Upload and download study notes for GPC Jammu 6th Semester" />
  <title>Notes — Smart Student Portal</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/notes.css" />
</head>

<body class="app-page">

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="fas fa-graduation-cap"></i><span>Smart<b>Portal</b></span></div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
      <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
      <a href="notes.html" class="nav-item active"><i class="fas fa-file-alt"></i><span>Notes</span></a>
      <a href="attendance.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Attendance</span></a>
      <a href="timetable.html" class="nav-item"><i class="fas fa-clock"></i><span>Timetable</span></a>
      <a href="announcements.html" class="nav-item"><i class="fas fa-bullhorn"></i><span>Announcements</span></a>
      <a href="ai-summarizer.html" class="nav-item"><i class="fas fa-robot"></i><span>AI Summarizer</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">S</div>
        <div>
          <p id="userName">Student</p><small id="userRoll">Roll No.</small>
        </div>
      </div>
      <button class="logout-btn" onclick="logoutUser()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </aside>

  <!-- Mobile top bar -->
  <div class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <span class="topbar-title">Notes</span>
    <button class="logout-btn" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i></button>
  </div>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main-content">
    <div class="page-header"
      style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px;">
      <div>
        <h1>📚 Notes Library</h1>
        <p>Upload, browse and download study notes for all 6th semester subjects</p>
      </div>
      <button class="btn btn-primary" onclick="openUploadModal()">
        <i class="fas fa-plus"></i> Upload Note
      </button>
    </div>

    <!-- Filter & Search -->
    <div class="notes-toolbar">
      <div class="filter-tabs">
        <button class="filter-btn active" onclick="filterNotes('all')">All</button>
        <button class="filter-btn" onclick="filterNotes('network-management')">🌐 NM</button>
        <button class="filter-btn" onclick="filterNotes('data-information-security')">🔒 DIS</button>
        <button class="filter-btn" onclick="filterNotes('wireless-media-communication')">📡 WMC</button>
        <button class="filter-btn" onclick="filterNotes('open-source-technologies')">🐧 OST</button>
      </div>
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search notes..." oninput="searchNotes()" />
      </div>
    </div>

    <!-- Notes Grid (filled by notes.js) -->
    <div class="notes-grid" id="notesGrid">
      <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading notes...</div>
    </div>
  </main>

  <!-- ========== UPLOAD MODAL ========== -->
  <div class="upload-modal hidden" id="uploadModal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">📤 Upload Note</span>
        <button class="modal-close" onclick="closeUploadModal()">✕</button>
      </div>

      <!-- Title -->
      <div class="form-group">
        <label>Note Title *</label>
        <input type="text" class="form-control" id="noteTitle" placeholder="e.g. Unit 1 – Network Basics" />
      </div>

      <!-- Subject -->
      <div class="form-group">
        <label>Subject *</label>
        <select class="form-control" id="noteSubject">
          <option value="">— Select Subject —</option>
          <option value="network-management">🌐 Network Management</option>
          <option value="data-information-security">🔒 Data & Information Security</option>
          <option value="wireless-media-communication">📡 Wireless Communication</option>
          <option value="open-source-technologies">🐧 Open Source Technologies</option>
        </select>
      </div>

      <!-- Unit -->
      <div class="form-group">
        <label>Unit / Topic</label>
        <input type="text" class="form-control" id="noteUnit" placeholder="e.g. Unit 1, Chapter 3" />
      </div>

      <!-- Description -->
      <div class="form-group">
        <label>Description</label>
        <textarea class="form-control" id="noteDesc" placeholder="What's covered in these notes?" rows="3"></textarea>
      </div>

      <!-- File Upload -->
      <div class="form-group">
        <label>Attach File (PDF, image, doc — max 10MB) *</label>
        <div class="file-upload-zone" id="dropZone" onclick="document.getElementById('noteFile').click()">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>Click to choose a file or drag & drop</p>
          <div class="file-name" id="fileName">No file chosen</div>
        </div>
        <input type="file" id="noteFile" style="display:none" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.txt,.ppt,.pptx"
          onchange="fileSelected(this)" />
      </div>

      <!-- Upload Progress -->
      <div class="progress-section hidden" id="uploadProgress">
        <div class="progress-track">
          <div class="fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
      </div>

      <!-- Upload Message -->
      <div id="uploadMsg" class="auth-msg"></div>

      <!-- Buttons -->
      <div style="display:flex; gap:10px; margin-top:16px;">
        <button class="btn btn-primary" style="flex:1" onclick="uploadNote()">
          <i class="fas fa-upload"></i> Upload Note
        </button>
        <button class="btn btn-ghost" onclick="closeUploadModal()">Cancel</button>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/notes.js"></script>

  
</body>

</html>
